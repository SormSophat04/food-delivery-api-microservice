name: food-delivery-api

services:
  # ==================== Infrastructure Services ====================

  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - "2181:2181"
    networks:
      - food-delivery-network
    healthcheck:
      test: ["CMD", "nc", "-z", "localhost", "2181"]
      interval: 10s
      timeout: 5s
      retries: 5

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: kafka
    depends_on:
      zookeeper:
        condition: service_healthy
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,PLAINTEXT_HOST://localhost:29092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
    ports:
      - "9092:9092"
      - "29092:29092"
    networks:
      - food-delivery-network
    healthcheck:
      test: ["CMD", "kafka-broker-api-versions", "--bootstrap-server", "localhost:9092"]
      interval: 10s
      timeout: 10s
      retries: 5

  postgres:
    image: postgres:16
    container_name: postgres
    environment:
      POSTGRES_DB: food_delivery
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: pg12345
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - food-delivery-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  mongo:
    image: mongo:7.0
    container_name: mongo
    environment:
      MONGO_INITDB_DATABASE: delivery_service_db
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db
    networks:
      - food-delivery-network
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ==================== Application Services ====================

  config-server:
    image: food-delivery/config-server:v1
    container_name: config-server
    build:
      context: ../../services/config-server
      dockerfile: ../../infrastructure/docker/Dockerfile
    ports:
      - "8090:8090"
    environment:
      - SPRING_PROFILES_ACTIVE=docker
    networks:
      - food-delivery-network
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:8090/actuator/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 30s

  eureka-server:
    image: food-delivery/eureka-server:v1
    container_name: eureka-server
    build:
      context: ../../services/eureka-server
      dockerfile: ../../infrastructure/docker/Dockerfile
    ports:
      - "8091:8091"
    environment:
      - SPRING_PROFILES_ACTIVE=docker
      - CONFIG_SERVER_URI=http://config-server:8090
    depends_on:
      config-server:
        condition: service_healthy
    networks:
      - food-delivery-network
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:8091/actuator/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 30s

  gateway-server:
    image: food-delivery/gateway-server:v1
    container_name: gateway-server
    build:
      context: ../../services/gateway-server
      dockerfile: ../../infrastructure/docker/Dockerfile
    ports:
      - "8092:8092"
    environment:
      - SPRING_PROFILES_ACTIVE=docker
      - CONFIG_SERVER_URI=http://config-server:8090
      - EUREKA_CLIENT_SERVICE_URL_DEFAULTZONE=http://eureka-server:8091/eureka/
      - JWT_SECRET=replace-with-secure-secret
      - JWT_ISSUER=food-delivery-api
      - JWT_EXPIRATION_MS=86400000
      - REDIS_HOST=redis
      - REDIS_PORT=6379
    depends_on:
      eureka-server:
        condition: service_healthy
    networks:
      - food-delivery-network
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:8092/actuator/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 45s

  auth-service:
    image: food-delivery/auth-service:v1
    container_name: auth-service
    build:
      context: ../../services/auth-service
      dockerfile: ../../infrastructure/docker/Dockerfile
    ports:
      - "8080:8080"
    environment:
      - SPRING_PROFILES_ACTIVE=docker
      - CONFIG_SERVER_URI=http://config-server:8090
      - EUREKA_CLIENT_SERVICE_URL_DEFAULTZONE=http://eureka-server:8091/eureka/
      - DB_URL=jdbc:postgresql://postgres:5432/food_delivery
      - DB_USERNAME=postgres
      - DB_PASSWORD=pg12345
      - JPA_DDL_AUTO=update
      - JWT_SECRET=replace-with-secure-secret
      - JWT_ISSUER=food-delivery-api
      - JWT_EXPIRATION_MS=86400000
      - OAUTH2_CLIENT_ID_WEB=food-delivery-web
      - OAUTH2_CLIENT_SECRET_WEB={noop}secret-web
      - OAUTH2_CLIENT_ID_MOBILE=food-delivery-mobile
      - OAUTH2_CLIENT_SECRET_MOBILE={noop}secret-mobile
      - OAUTH2_REDIRECT_URI_WEB=http://localhost:3000/login/oauth2/code/food-delivery
      - OAUTH2_REDIRECT_URI_MOBILE=fooddelivery://oauth2/callback
      - OAUTH2_ACCESS_TOKEN_TTL=30
      - OAUTH2_REFRESH_TOKEN_TTL=1440
      - MAIL_HOST=smtp.gmail.com
      - MAIL_PORT=587
      - MAIL_USERNAME=sophatsorm2023@gmail.com
      - MAIL_PASSWORD=rpez slxo drgo qjjh
      - MAIL_SMTP_AUTH=true
      - MAIL_SMTP_STARTTLS=true
      - MAIL_FROM=noreply@food-delivery.local
      - MAIL_BRAND_NAME=Food Delivery
      - OTP_LENGTH=6
      - OTP_TTL_MINUTES=10
      - SPRING_KAFKA_BOOTSTRAP_SERVERS=kafka:9092
    depends_on:
      eureka-server:
        condition: service_healthy
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy
    networks:
      - food-delivery-network
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:8080/actuator/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 45s

  food-service:
    image: food-delivery/food-service:v1
    container_name: food-service
    build:
      context: ../../services/food-service
      dockerfile: ../../infrastructure/docker/Dockerfile
    ports:
      - "8081:8081"
    environment:
      - SPRING_PROFILES_ACTIVE=docker
      - CONFIG_SERVER_URI=http://config-server:8090
      - EUREKA_CLIENT_SERVICE_URL_DEFAULTZONE=http://eureka-server:8091/eureka/
      - DB_URL=jdbc:postgresql://postgres:5432/food_delivery
      - DB_USERNAME=postgres
      - DB_PASSWORD=pg12345
      - JPA_DDL_AUTO=update
      - SPRING_KAFKA_BOOTSTRAP_SERVERS=kafka:9092
    depends_on:
      eureka-server:
        condition: service_healthy
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy
    networks:
      - food-delivery-network
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:8081/actuator/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 45s

  delivery-service:
    image: food-delivery/delivery-service:v1
    container_name: delivery-service
    build:
      context: ../../services/delivery-service
      dockerfile: ../../infrastructure/docker/Dockerfile
    ports:
      - "8082:8082"
    environment:
      - SPRING_PROFILES_ACTIVE=docker
      - CONFIG_SERVER_URI=http://config-server:8090
      - EUREKA_CLIENT_SERVICE_URL_DEFAULTZONE=http://eureka-server:8091/eureka/
      - SPRING_KAFKA_BOOTSTRAP_SERVERS=kafka:9092
      - KAFKA_ENABLED=true
    depends_on:
      eureka-server:
        condition: service_healthy
      mongo:
        condition: service_healthy
      kafka:
        condition: service_healthy
    networks:
      - food-delivery-network
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:8082/actuator/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 45s

  order-service:
    image: food-delivery/order-service:v1
    container_name: order-service
    build:
      context: ../../services/order-service
      dockerfile: ../../infrastructure/docker/Dockerfile
    ports:
      - "8083:8083"
    environment:
      - SPRING_PROFILES_ACTIVE=docker
      - CONFIG_SERVER_URI=http://config-server:8090
      - EUREKA_CLIENT_SERVICE_URL_DEFAULTZONE=http://eureka-server:8091/eureka/
      - DB_URL=jdbc:postgresql://postgres:5432/food_delivery
      - DB_USERNAME=postgres
      - DB_PASSWORD=pg12345
      - JPA_DDL_AUTO=update
      - SPRING_KAFKA_BOOTSTRAP_SERVERS=kafka:9092
    depends_on:
      eureka-server:
        condition: service_healthy
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy
    networks:
      - food-delivery-network
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:8083/actuator/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 45s

  restaurant-service:
    image: food-delivery/restaurant-service:v1
    container_name: restaurant-service
    build:
      context: ../../services/restaurant-service
      dockerfile: ../../infrastructure/docker/Dockerfile
    ports:
      - "8084:8084"
    environment:
      - SPRING_PROFILES_ACTIVE=docker
      - CONFIG_SERVER_URI=http://config-server:8090
      - EUREKA_CLIENT_SERVICE_URL_DEFAULTZONE=http://eureka-server:8091/eureka/
      - DB_URL=jdbc:postgresql://postgres:5432/food_delivery
      - DB_USERNAME=postgres
      - DB_PASSWORD=pg12345
      - JPA_DDL_AUTO=update
      - SPRING_KAFKA_BOOTSTRAP_SERVERS=kafka:9092
    depends_on:
      eureka-server:
        condition: service_healthy
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy
    networks:
      - food-delivery-network
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:8084/actuator/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 45s

networks:
  food-delivery-network:
    driver: bridge

volumes:
  postgres-data:
  mongo-data:
