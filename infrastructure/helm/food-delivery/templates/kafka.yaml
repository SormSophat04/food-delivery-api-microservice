{{- if .Values.infrastructure.kafka.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Values.infrastructure.kafka.name }}
  namespace: {{ include "food-delivery.namespace" . }}
spec:
  replicas: 1
  selector:
    matchLabels:
      app: {{ .Values.infrastructure.kafka.name }}
  template:
    metadata:
      labels:
        app: {{ .Values.infrastructure.kafka.name }}
    spec:
      containers:
        - name: {{ .Values.infrastructure.kafka.name }}
          image: "{{ .Values.infrastructure.kafka.image }}:{{ .Values.infrastructure.kafka.imageTag }}"
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: {{ .Values.infrastructure.kafka.port }}
          env:
            - name: KAFKA_BROKER_ID
              value: "{{ .Values.infrastructure.kafka.brokerId }}"
            - name: KAFKA_ZOOKEEPER_CONNECT
              value: "{{ .Values.infrastructure.kafka.zookeeper }}:{{ .Values.infrastructure.kafka.zookeeperPort }}"
            - name: KAFKA_ADVERTISED_LISTENERS
              value: "PLAINTEXT://{{ .Values.infrastructure.kafka.name }}:{{ .Values.infrastructure.kafka.port }}"
            - name: KAFKA_LISTENERS
              value: "PLAINTEXT://0.0.0.0:{{ .Values.infrastructure.kafka.port }}"
            - name: KAFKA_LISTENER_SECURITY_PROTOCOL_MAP
              value: PLAINTEXT:PLAINTEXT
            - name: KAFKA_INTER_BROKER_LISTENER_NAME
              value: PLAINTEXT
            - name: KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR
              value: "1"
---
apiVersion: v1
kind: Service
metadata:
  name: {{ .Values.infrastructure.kafka.name }}
  namespace: {{ include "food-delivery.namespace" . }}
spec:
  selector:
    app: {{ .Values.infrastructure.kafka.name }}
  ports:
    - port: {{ .Values.infrastructure.kafka.port }}
      targetPort: {{ .Values.infrastructure.kafka.port }}
  type: ClusterIP
{{- end }}
