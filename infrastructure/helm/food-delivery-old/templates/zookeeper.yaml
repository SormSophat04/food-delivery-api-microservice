{{- if .Values.infrastructure.zookeeper.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Values.infrastructure.zookeeper.name }}
  namespace: {{ include "food-delivery.namespace" . }}
spec:
  replicas: 1
  selector:
    matchLabels:
      app: {{ .Values.infrastructure.zookeeper.name }}
  template:
    metadata:
      labels:
        app: {{ .Values.infrastructure.zookeeper.name }}
    spec:
      containers:
        - name: {{ .Values.infrastructure.zookeeper.name }}
          image: "{{ .Values.infrastructure.zookeeper.image }}:{{ .Values.infrastructure.zookeeper.imageTag }}"
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: {{ .Values.infrastructure.zookeeper.port }}
          env:
            - name: ZOOKEEPER_CLIENT_PORT
              value: "{{ .Values.infrastructure.zookeeper.port }}"
            - name: ZOOKEEPER_TICK_TIME
              value: "{{ .Values.infrastructure.zookeeper.tickTime }}"
---
apiVersion: v1
kind: Service
metadata:
  name: {{ .Values.infrastructure.zookeeper.name }}
  namespace: {{ include "food-delivery.namespace" . }}
spec:
  selector:
    app: {{ .Values.infrastructure.zookeeper.name }}
  ports:
    - port: {{ .Values.infrastructure.zookeeper.port }}
      targetPort: {{ .Values.infrastructure.zookeeper.port }}
  type: ClusterIP
{{- end }}
