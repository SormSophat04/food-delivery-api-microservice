apiVersion: apps/v1
kind: Deployment
metadata:
  name: gateway-server
  namespace: food-delivery-system
spec:
  replicas: 1
  selector:
    matchLabels:
      app: gateway-server
  template:
    metadata:
      labels:
        app: gateway-server
    spec:
      containers:
        - name: gateway-server
          image: food-delivery/gateway-server:v1
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8092
