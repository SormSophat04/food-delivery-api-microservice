apiVersion: apps/v1
kind: Deployment
metadata:
  name: auth-service
  namespace: banking-system
spec:
  replicas: 3
  selector:
    matchLabels:
      app: auth-service
  template:
    metadata:
      labels:
        app: auth-service
    spec:
      name: auth-service
      image: food-delivery/auth-service:v1
      ports:
       - containerPort: 8080
      resources:
        requests:
          memory: "256Mi"
          cpu: "250m"
          limits:
            memory: "512Mi"
            cpu: "500m"
            livenessProbe:
              httpGet:
                path: /actuator/health
                port: 8080
                initialDelaySeconds: 30
                periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: auth-service
  namespace: banking-system
spec:
  selector:
    app: auth-service
  ports:
    - port: 8080
      targetPort: 8080