spring.application.name=auth-service
server.port=8080

# PostgreSQL database configuration
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/food_delivery}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:pg12345}

# JPA and Hibernate configuration
spring.jpa.hibernate.ddl-auto=${JPA_DDL_AUTO:update}
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# JWT configuration
security.jwt.secret=${JWT_SECRET:replace-with-secure-secret}
security.jwt.expiration-ms=${JWT_EXPIRATION_MS:86400000}
security.jwt.issuer=${JWT_ISSUER:food-delivery-api}

# OTP configuration
app.otp.length=${OTP_LENGTH:6}

app.otp.ttl-minutes=${OTP_TTL_MINUTES:10}

# Mail configuration
spring.mail.host=${MAIL_HOST:smtp.gmail.com}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USERNAME:sophatsorm2023@gmail.com}
spring.mail.password=${MAIL_PASSWORD:rpez slxo drgo qjjh}
spring.mail.properties.mail.smtp.auth=${MAIL_SMTP_AUTH:true}
spring.mail.properties.mail.smtp.starttls.enable=${MAIL_SMTP_STARTTLS:true}
app.mail.from=${MAIL_FROM:noreply@food-delivery.local}
app.mail.brand-name=${MAIL_BRAND_NAME:Food Delivery}


#Kafka
spring.kafka.bootstrap-servers=localhost:9092
spring.kafka.consumer.group-id= order-group
spring.kafka.consumer.auto-offset-reset= earliest
spring.kafka.producer.key-serializer= org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer= org.springframework.kafka.support.serializer.JsonSerializer