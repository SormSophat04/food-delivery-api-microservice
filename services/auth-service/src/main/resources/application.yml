spring:
  application:
    name: auth-service
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/food_delivery}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:pg12345}
  jpa:
    hibernate:
      ddl-auto: ${JPA_DDL_AUTO:update}
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
  mail:
    host: ${MAIL_HOST:smtp.gmail.com}
    port: ${MAIL_PORT:587}
    username: ${MAIL_USERNAME:sophatsorm2023@gmail.com}
    password: ${MAIL_PASSWORD:rpez slxo drgo qjjh}
    properties:
      mail:
        smtp:
          auth: ${MAIL_SMTP_AUTH:true}
          starttls:
            enable: ${MAIL_SMTP_STARTTLS:true}
  kafka:
    bootstrap-servers: localhost:9092
    consumer:
      group-id: order-group
      auto-offset-reset: earliest
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer

server:
  port: 8080

security:
  jwt:
    secret: ${JWT_SECRET:replace-with-secure-secret}
    expiration-ms: ${JWT_EXPIRATION_MS:604800000}
    issuer: ${JWT_ISSUER:food-delivery-api}

app:
  otp:
    length: ${OTP_LENGTH:6}
    ttl-minutes: ${OTP_TTL_MINUTES:10}
  mail:
    from: ${MAIL_FROM:noreply@food-delivery.local}
    brand-name: ${MAIL_BRAND_NAME:Food Delivery}

eureka:
  instance:
    prefer-ip-address: true
  client:
    register-with-eureka: true
    fetch-registry: true
    service-url:
      defaultZone: http://localhost:8091/eureka/

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    try-it-out-enabled: true