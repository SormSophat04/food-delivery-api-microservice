spring.application.name=gateway-server
server.port=8092

management.endpoints.web.exposure.include=*
management.health.rabbit.enabled=true
management.info.env.enabled=true

# JWT configuration (must match auth-service token settings)
security.jwt.secret=${JWT_SECRET:replace-with-secure-secret}
security.jwt.issuer=${JWT_ISSUER:food-delivery-api}

# Eureka client
eureka.instance.prefer-ip-address=true
eureka.client.register-with-eureka=true
eureka.client.fetch-registry=true
eureka.client.service-url.defaultZone=http://localhost:8091/eureka/

# OpenAPI / Swagger
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.try-it-out-enabled=true
springdoc.swagger-ui.urls[0].name=auth-service
springdoc.swagger-ui.urls[0].url=/api/auth/v3/api-docs
springdoc.swagger-ui.urls[1].name=food-service
springdoc.swagger-ui.urls[1].url=/api/foods/v3/api-docs
springdoc.swagger-ui.urls[2].name=delivery-service
springdoc.swagger-ui.urls[2].url=/api/addresses/v3/api-docs
springdoc.swagger-ui.urls[3].name=restaurant-service
springdoc.swagger-ui.urls[3].url=/api/restaurants/v3/api-docs
springdoc.swagger-ui.urls[4].name=order-service
springdoc.swagger-ui.urls[4].url=/api/orders/v3/api-docs

# Gateway routes - OpenAPI doc proxies (evaluated first)
spring.cloud.gateway.routes[0].id=auth-openapi
spring.cloud.gateway.routes[0].uri=lb://auth-service
spring.cloud.gateway.routes[0].predicates[0]=Path=/api/auth/v3/api-docs
spring.cloud.gateway.routes[0].filters[0]=StripPrefix=2

spring.cloud.gateway.routes[1].id=food-openapi
spring.cloud.gateway.routes[1].uri=lb://food-service
spring.cloud.gateway.routes[1].predicates[0]=Path=/api/foods/v3/api-docs
spring.cloud.gateway.routes[1].filters[0]=StripPrefix=2

spring.cloud.gateway.routes[2].id=delivery-openapi
spring.cloud.gateway.routes[2].uri=lb://delivery-service
spring.cloud.gateway.routes[2].predicates[0]=Path=/api/addresses/v3/api-docs
spring.cloud.gateway.routes[2].filters[0]=StripPrefix=2

spring.cloud.gateway.routes[3].id=restaurant-openapi
spring.cloud.gateway.routes[3].uri=lb://restaurant-service
spring.cloud.gateway.routes[3].predicates[0]=Path=/api/restaurants/v3/api-docs
spring.cloud.gateway.routes[3].filters[0]=StripPrefix=2

spring.cloud.gateway.routes[4].id=order-openapi
spring.cloud.gateway.routes[4].uri=lb://order-service
spring.cloud.gateway.routes[4].predicates[0]=Path=/api/orders/v3/api-docs
spring.cloud.gateway.routes[4].filters[0]=StripPrefix=2

# Service routes
spring.cloud.gateway.routes[5].id=auth-service
spring.cloud.gateway.routes[5].uri=lb://auth-service
spring.cloud.gateway.routes[5].predicates[0]=Path=/api/auth/**,/api/users/**

spring.cloud.gateway.routes[6].id=delivery-service
spring.cloud.gateway.routes[6].uri=lb://delivery-service
spring.cloud.gateway.routes[6].predicates[0]=Path=/api/addresses,/api/addresses/**

spring.cloud.gateway.routes[7].id=food-service
spring.cloud.gateway.routes[7].uri=lb://food-service
spring.cloud.gateway.routes[7].predicates[0]=Path=/api/foods,/api/foods/**

spring.cloud.gateway.routes[8].id=restaurant-service
spring.cloud.gateway.routes[8].uri=lb://restaurant-service
spring.cloud.gateway.routes[8].predicates[0]=Path=/api/restaurants,/api/restaurants/**,/api/promotions/**

spring.cloud.gateway.routes[9].id=order-service
spring.cloud.gateway.routes[9].uri=lb://order-service
spring.cloud.gateway.routes[9].predicates[0]=Path=/api/orders,/api/orders/**

spring.cloud.gateway.routes[10].id=food-categories
spring.cloud.gateway.routes[10].uri=lb://food-service
spring.cloud.gateway.routes[10].predicates[0]=Path=/api/categories,/api/categories/**