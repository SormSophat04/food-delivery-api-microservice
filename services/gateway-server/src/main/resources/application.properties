spring.application.name=gateway-server
server.port=8092

management.endpoints.web.exposure.include=*
management.health.rabbit.enabled=true
management.info.env.enabled=true

# JWT configuration (must match auth-service token settings)
security.jwt.secret=${JWT_SECRET:replace-with-secure-secret}
security.jwt.issuer=${JWT_ISSUER:food-delivery-api}

#
spring.cloud.gateway.server.webflux.httpclient.connect-timeout= 3000
spring.cloud.gateway.server.webflux.httpclient.response-timeout= 5s
spring.cloud.gateway.server.webflux.httpclient.pool.acquire-timeout= 4500
spring.cloud.gateway.server.webflux.httpclient.pool.max-life-time= 60s
spring.cloud.gateway.server.webflux.httpclient.pool.max-idle-time= 15s