spring.application.name=gateway-server
server.port=8092

management.endpoints.web.exposure.include=*
#management.health.rabbit.enabled=true
management.info.env.enabled=true

# JWT configuration (must match auth-service token settings)
security.jwt.secret=${JWT_SECRET:replace-with-secure-secret}
security.jwt.issuer=${JWT_ISSUER:food-delivery-api}

# Eureka client
eureka.instance.prefer-ip-address=true
eureka.client.register-with-eureka=true
eureka.client.fetch-registry=true
eureka.client.service-url.defaultZone=http://localhost:8091/eureka/

