server:
  port: 8092
spring:
  application:
    name: gateway-server
  cloud:
    gateway:
      globals:
        cors-configurations:
          '[/**]':
            allowed-origins: "*"
            allowed-methods: "*"
            allowed-headers: "*"
management:
  endpoints:
    web:
      exposure:
        include: "*"
  info:
    env:
      enabled: true

# JWT configuration (must match auth-service token settings)
security:
  jwt:
    secret: ${JWT_SECRET:replace-with-secure-secret}
    issuer: ${JWT_ISSUER:food-delivery-api}

# Eureka client
eureka:
  instance:
    prefer-ip-address: true
  client:
    register-with-eureka: true
    fetch-registry: true
    service-url:
      defaultZone: http://localhost:8091/eureka/