server:
  port: 8092
spring:
  application:
    name: gateway-server
  r2dbc:
    url: ${R2DBC_URL:r2dbc:postgresql://localhost:5432/food_delivery}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:pg12345}
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/food_delivery}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:pg12345}
  jpa:
    hibernate:
      ddl-auto: ${JPA_DDL_AUTO:update}
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
  cloud:
    gateway:
      globalcors:
        cors-configurations:
          '[/**]':
            allowed-origins: "*"
            allowed-methods: "*"
            allowed-headers: "*"
      routes:
        - id: food-service
          uri: lb://food-service
          predicates:
            - Path=/api/foods/**
          filters:
            - name: RequestRateLimiter
              args:
                redis-rate-limiter.replenishRate: 20
                redis-rate-limiter.burstCapacity: 40
                key-resolver: "#{@userKeyResolver}"

        - id: order-service
          uri: lb://order-service
          predicates:
            - Path=/api/orders/**
          filters:
            - name: RequestRateLimiter
              args:
                redis-rate-limiter.replenishRate: 10
                redis-rate-limiter.burstCapacity: 20
                key-resolver: "#{@userKeyResolver}"

        - id: delivery-service
          uri: lb://delivery-service
          predicates:
            - Path=/api/deliveries/**
          filters:
            - name: RequestRateLimiter
              args:
                redis-rate-limiter.replenishRate: 10
                redis-rate-limiter.burstCapacity: 20
                key-resolver: "#{@userKeyResolver}"

        - id: restaurant-service
          uri: lb://restaurant-service
          predicates:
            - Path=/api/restaurants/**
          filters:
            - name: RequestRateLimiter
              args:
                redis-rate-limiter.replenishRate: 20
                redis-rate-limiter.burstCapacity: 40
                key-resolver: "#{@userKeyResolver}"

        - id: auth-service
          uri: lb://auth-service
          predicates:
            - Path=/api/auth/**,/oauth2/**,/.well-known/**

management:
  endpoints:
    web:
      exposure:
        include: "*"
  info:
    env:
      enabled: true

# JWT configuration (must match auth-service token settings)
security:
  jwt:
    secret: ${JWT_SECRET:replace-with-secure-secret}
    issuer: ${JWT_ISSUER:food-delivery-api}

# Eureka client
eureka:
  instance:
    prefer-ip-address: true
  client:
    register-with-eureka: true
    fetch-registry: true
    service-url:
      defaultZone: http://localhost:8091/eureka/