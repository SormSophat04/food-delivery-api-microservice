spring.application.name=delivery-service
server.port=8082

management.endpoints.web.exposure.include=*
management.health.rabbit.enabled=true
management.info.env.enabled=true

spring.autoconfigure.exclude=\
  org.springframework.boot.autoconfigure.jdbc.DataSourceAutoConfiguration,\
  org.springframework.boot.autoconfigure.orm.jpa.HibernateJpaAutoConfiguration

# Mongo placeholder
spring.data.mongodb.host=${MONGODB_HOST_NAME:localhost}
spring.data.mongodb.port=27017
spring.data.mongodb.database=delivery_service_db
spring.data.mongodb.auto-index-creation=true

#join with eureka server
eureka.instance.prefer-ip-address=true
eureka.client.register-with-eureka=true
eureka.client.fetch-registry=true
eureka.client.service-url.defaultZone=http://localhost:8091/eureka/

#Kafka (disabled by default; set kafka.enabled=true when Kafka is running)
kafka.enabled=false
spring.kafka.bootstrap-servers=localhost:9092
spring.kafka.consumer.group-id=delivery-group
spring.kafka.consumer.auto-offset-reset=earliest
spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.value-deserializer=org.springframework.kafka.support.serializer.JsonDeserializer
spring.kafka.consumer.properties.spring.json.trusted.packages=com.food.eat

# OpenAPI / Swagger
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.try-it-out-enabled=true
